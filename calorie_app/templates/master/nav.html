<nav class="topnav">
  <a class="brand" href="{% url 'dashboard' %}">
    <i class="fa-solid fa-fire-flame-curved"></i> CalorieTrack
  </a>

  <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
    <i class="fa-solid fa-bars"></i>
  </button>

  <ul class="nav-links" id="navLinks">
    <li>
      <a href="{% url 'dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </a>
    </li>
    <li>
      <a href="{% url 'profile' %}" {% if request.resolver_match.url_name == 'profile' %}class="active"{% endif %}>
        <i class="fa-solid fa-user"></i> Profile
      </a>
    </li>
    <li>
      <a href="{% url 'CalorieConsume' %}" {% if request.resolver_match.url_name == 'CalorieConsume' %}class="active"{% endif %}>
        <i class="fa-solid fa-utensils"></i> Log Food
      </a>
    </li>
    {% if request.user.is_authenticated %}
    <li class="logout">
      <a href="{% url 'logout_page' %}">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>
    </li>
    {% else %}
    <li>
      <a href="{% url 'login_page' %}">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </a>
    </li>
    {% endif %}
  </ul>
</nav>
