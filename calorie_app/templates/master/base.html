<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <title>{{ title }} — CalorieTrack</title>

    <style>
      :root {
        --bg:        #0d0f14;
        --surface:   #161a23;
        --border:    #242836;
        --accent:    #00e5a0;
        --accent2:   #ff6b6b;
        --text:      #e8eaf0;
        --muted:     #6b7280;
        --font-head: 'Space Mono', monospace;
        --font-body: 'DM Sans', sans-serif;
        --radius:    14px;
        --shadow:    0 4px 30px rgba(0,0,0,0.4);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.6;
        min-height: 100vh;
      }

      /* subtle animated grid background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .page-wrap {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 20px 60px;
      }

      /* ── NAV ── */
      .topnav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 40px;
      }

      .brand {
        font-family: var(--font-head);
        font-size: 1.1rem;
        color: var(--accent);
        text-decoration: none;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .brand i { font-size: .9rem; }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
        list-style: none;
      }

      .nav-links a {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 8px;
        text-decoration: none;
        color: var(--muted);
        font-size: 0.875rem;
        font-weight: 500;
        transition: color .2s, background .2s;
      }
      .nav-links a:hover,
      .nav-links a.active { color: var(--text); background: var(--border); }
      .nav-links .logout a { color: var(--accent2); }
      .nav-links .logout a:hover { background: rgba(255,107,107,.12); }

      /* ── PAGE HEADING ── */
      .page-header {
        margin-bottom: 32px;
      }
      .page-header h1 {
        font-family: var(--font-head);
        font-size: clamp(1.4rem, 3vw, 1.9rem);
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.5px;
      }
      .page-header h1 span { color: var(--accent); }

      /* ── CARD ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px 32px;
        box-shadow: var(--shadow);
      }

      /* ── MOBILE NAV ── */
      .nav-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.3rem; cursor: pointer; }

      @media (max-width: 640px) {
        .nav-toggle { display: block; }
        .nav-links { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; z-index: 100; }
        .nav-links.open { display: flex; }
        .topnav { position: relative; }
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      {% include 'master/nav.html' %}

      <div class="page-header">
        <h1>{{ heading }}</h1>
      </div>

      {% block blockname %}{% endblock %}
    </div>

    <script>
      const toggle = document.getElementById('navToggle');
      const links  = document.getElementById('navLinks');
      if (toggle) toggle.addEventListener('click', () => links.classList.toggle('open'));
    </script>
  </body>
</html>
